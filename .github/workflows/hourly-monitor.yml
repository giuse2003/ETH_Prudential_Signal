name: Hourly ETH monitor (Telegram)

on:
  schedule:
    - cron: "*/10 * * * *" # LIVE ogni 10 minuti; Yahoo forza la candela chiusa finche manca
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Restore monitor state (cache)
        id: cache-state
        uses: actions/cache/restore@v4
        with:
          path: |
            .state
            data/ETH-USD_daily.csv
            data/ETH-EUR_daily.csv
          key: state-${{ github.run_id }}
          restore-keys: |
            state-

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run hourly monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python hourly_monitor.py

      - name: Publish dashboard status
        run: |
          mkdir -p docs
          cp reports/status.json docs/status.json
          cp reports/chart-data.json docs/chart-data.json
          cp reports/backtest.json docs/backtest.json
          test ! -f reports/live-status.json || cp reports/live-status.json docs/live-status.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/status.json docs/chart-data.json docs/backtest.json
          test ! -f docs/live-status.json || git add docs/live-status.json
          git diff --cached --quiet || git commit -m "Aggiorna status dashboard"
          git push

      - name: Save monitor state (cache)
        uses: actions/cache/save@v4
        with:
          path: |
            .state
            data/ETH-USD_daily.csv
            data/ETH-EUR_daily.csv
          key: state-${{ github.run_id }}

